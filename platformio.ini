; =====================================================================
;  Industrial Refrigerator Monitor — PlatformIO project configuration
;  Target board: WT32-ETH01 (a.k.a. ESP32-ETH01) with LAN8720 PHY
; =====================================================================

[platformio]
default_envs = wt32-eth01
data_dir = data

[env:wt32-eth01]
platform  = espressif32@^6.5.0
board     = wt32-eth01
framework  = arduino

; ---- Serial / upload ------------------------------------------------
monitor_speed = 115200
upload_speed  = 921600
upload_port   = /dev/cu.usbserial-AB54L85O
monitor_port  = /dev/cu.usbserial-AB54L85O

; ---- Filesystem -----------------------------------------------------
; A custom partition table is used so the LittleFS data partition is
; large enough to hold ~30 days of history plus the web UI.
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; Embed the web UI (data/) into the firmware as gzipped PROGMEM assets.
; This removes the need for `uploadfs`, so the LittleFS data partition
; (history + logs) is never erased by deploys and survives OTA updates.
extra_scripts = pre:scripts/embed_web.py

; ---- Compiler flags -------------------------------------------------
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D ASYNCWEBSERVER_REGEX
    ; WT32-ETH01 Ethernet (LAN8720) pin mapping — defined in src/config.h,
    ; repeated here so libraries that read them at compile time agree.
    -D ETH_PHY_TYPE=ETH_PHY_LAN8720
    -D ETH_PHY_ADDR=1
    -D ETH_PHY_MDC=23
    -D ETH_PHY_MDIO=18
    -D ETH_PHY_POWER=16
    -D ETH_CLK_MODE=ETH_CLOCK_GPIO0_IN

; ---- Libraries ------------------------------------------------------
lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    bblanchon/ArduinoJson@^7.0.4
    mobizt/ESP Mail Client@^3.4.24
    esp32async/ESPAsyncWebServer@^3.6.0
    esp32async/AsyncTCP@^3.3.2

; =====================================================================
;  OTA (over-the-air) upload environment
;  After the device has been flashed once over USB and is on the network,
;  update it wirelessly:
;     pio run -e ota -t upload      ; firmware
;     pio run -e ota -t uploadfs    ; web UI (LittleFS)
;  Keep upload_port in sync with the device's static IP (config.h) and the
;  auth password in sync with OTA_PASSWORD (config.h).
; =====================================================================
[env:ota]
extends      = env:wt32-eth01
upload_protocol = espota
upload_port  = 192.168.1.50          ; set to your device's IP
upload_flags = --auth=change-me-to-a-strong-password   ; must match OTA_PASSWORD in src/secrets.h
